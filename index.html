<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>
    Device Review
  </title>

  <link rel="icon" href="./images/ファビコン.jpeg" />

  <link rel="stylesheet" href="./css/style.css" />

</head>

<body>

  <header class="header">

    <div class="header-inner">

      <h1 class="logo">
        DEVICE REVIEW
      </h1>

      <nav class="nav-center">

        <ul class="nav-list">

          <li>
            <a href="./index.html">
              REVIEW一覧
            </a>
          </li>

          <li>
            <a href="./board.html">
              掲示板
            </a>
          </li>

          <li>
            <a href="./profile.html">
              プロフィール
            </a>
          </li>

          <li>
            <a href="./about.html">
              サイトについて
            </a>
          </li>

        </ul>

      </nav>

      <div class="auth-area">

        <div id="userInfo"></div>

        <div class="auth-buttons">

          <button id="loginButton">
            Google Login
          </button>

          <button id="logoutButton">
            Logout
          </button>

        </div>

      </div>

    </div>

  </header>

  <main>

    <section class="hero">

      <div class="container">

        <h2>
          みんなのデバイス置き場
        </h2>

        <p>
          ゲーミングデバイス・ガジェット専用のレビューサイト
        </p>

      </div>

    </section>

    <section class="reviews">

      <div class="container">

        <div class="search-box">

          <span class="search-icon">
            🔍
          </span>

          <input type="text" id="searchInput" placeholder="Search reviews...">

        </div>

        <div class="filter-buttons">

          <button data-category="All">
            All
          </button>

          <button data-category="Mouse">
            Mouse
          </button>

          <button data-category="Keyboard">
            Keyboard
          </button>

          <button data-category="Mousepad">
            Mousepad
          </button>

          <button data-category="Audio">
            Audio
          </button>

          <button data-category="Monitor">
            Monitor
          </button>

          <button data-category="Mousefeet">
            Mousefeet
          </button>

          <button data-category="Other">
            Other
          </button>

        </div>

        <div class="review-grid" id="reviewGrid"></div>

      </div>

    </section>

  </main>

  <footer class="footer">

    <div class="container">

      <p>
        May the 4th be with you.
      </p>

    </div>

  </footer>

  <a href="./write-review.html" class="floating-button">
    +
  </a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="./js/profile.js"></script>

  <script src="./js/supabase.js"></script>

  <script src="./js/main.js"></script>

</body>

</html>
