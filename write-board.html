<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    掲示板に投稿
  </title>

  <link rel="icon" href="./images/ファビコン.jpeg" />

  <link rel="stylesheet" href="./css/style.css">

</head>

<body>

  <header class="header">

    <div class="header-inner">

      <h1 class="logo">
        DEVICE REVIEW
      </h1>

      <nav class="nav-center">

        <ul class="nav-list">

          <li><a href="./index.html">REVIEW一覧</a></li>
          <li><a href="./board.html">掲示板</a></li>
          <li><a href="./profile.html">プロフィール</a></li>
          <li><a href="./about.html">サイトについて</a></li>

        </ul>

      </nav>

      <div class="auth-area">

        <div id="userInfo"></div>

        <div class="auth-buttons">

          <button id="loginButton">
            Google Login
          </button>

          <button id="logoutButton">
            Logout
          </button>

        </div>

      </div>

    </div>

  </header>

  <main class="container">

    <section class="write-review">

      <h2>
        掲示板に投稿
      </h2>

      <form class="review-form" id="boardForm">

        <input type="text" id="title" placeholder="タイトル">

        <select id="category">

          <option>
            雑談
          </option>

          <option>
            質問
          </option>

          <option>
            相談
          </option>

          <option>
            デスク環境
          </option>

          <option>
            新製品
          </option>

        </select>

        <textarea id="content" placeholder="内容を書いてください"></textarea>

        <input type="file" id="boardImage" accept="image/*">

        <img id="boardImagePreview" class="image-preview" alt="preview">

        <button type="submit">
          投稿する
        </button>

      </form>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="./js/profile.js"></script>

  <script src="./js/supabase.js"></script>

  <script src="./js/write-board.js"></script>

</body>

</html>
